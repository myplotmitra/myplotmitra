<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;background:#FFFFFF;color:#111111;min-height:100vh;overflow-x:hidden}
:root{--or:#E85D04;--orl:#FF8C42;--ord:#C44D00;--ort:#FFF0E6;--black:#111111;--white:#FFFFFF;--g50:#F9F9F9;--g100:#F3F3F3;--g200:#E8E8E8;--g300:#D0D0D0;--g400:#AAAAAA;--g600:#666666;--g800:#333333;--r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:24px;--sh:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);--sh-card:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--g100)}::-webkit-scrollbar-thumb{background:var(--g300);border-radius:2px}
.install-bar{background:var(--or);color:#fff;padding:10px 16px;display:none;align-items:center;justify-content:space-between;gap:10px;font-size:13px;font-weight:500}.install-bar.show{display:flex}
.ibtn{background:#fff;color:var(--or);border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.iclose{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;opacity:.8;padding:0 4px}
.header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--g200);padding:0 16px}
.header-inner{max-width:1200px;margin:0 auto;height:56px;display:flex;align-items:center;gap:10px}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--or);letter-spacing:-.5px;white-space:nowrap;flex-shrink:0}
.logo span{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;color:var(--g400);margin-left:3px}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;height:38px;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r-md);padding:0 12px 0 36px;font-size:13px;color:var(--black);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s,box-shadow .15s}
.search-wrap input:focus{border-color:var(--or);box-shadow:0 0 0 3px var(--ort)}.search-wrap input::placeholder{color:var(--g400)}

.btn-signin:hover{background:var(--ort)}
.user-avatar{width:34px;height:34px;border-radius:50%;border:2px solid var(--or);cursor:pointer;object-fit:cover}
.filter-bar{background:#fff;border-bottom:1px solid var(--g200);position:sticky;top:56px;z-index:99}
.filter-inner{max-width:1200px;margin:0 auto;padding:8px 16px;display:flex;align-items:center;gap:10px}
.chips{display:flex;gap:6px;flex:1;overflow-x:auto}.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:5px 14px;border:1px solid var(--g200);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:#fff;color:var(--g600);transition:all .15s;flex-shrink:0}
.chip.on{background:var(--or);color:#fff;border-color:var(--or)}.chip:hover:not(.on){border-color:var(--or);color:var(--or)}

.map-legend{position:absolute;bottom:12px;left:12px;background:#fff;border:1px solid var(--g200);border-radius:var(--r-sm);padding:10px 12px;box-shadow:var(--sh);z-index:5}

.mleg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.pp-price{font-size:16px;font-weight:600;color:var(--or);margin-bottom:3px}

.pp-loc{font-size:11px;color:var(--g400);margin-bottom:10px}
.pp-dims{background:var(--ort);border-radius:var(--r-sm);padding:10px;margin-bottom:10px;border:1px solid #FFD4B3}
.pp-dims-lbl{font-size:9px;color:var(--or);font-weight:600;letter-spacing:.6px;margin-bottom:6px}
.pp-dims-row{display:flex;align-items:center;justify-content:space-around;gap:4px}
.pp-dim{text-align:center}.pp-dv{display:block;font-size:14px;font-weight:600;color:var(--ord)}.pp-dl{display:block;font-size:9px;color:var(--orl);margin-top:1px}.pp-x{font-size:14px;color:var(--g300)}
.pp-btn{width:100%;background:var(--or);color:#fff;border:none;border-radius:var(--r-sm);padding:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:background .15s}.pp-btn:hover{background:var(--ord)}
.sk-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r-md);overflow:hidden;box-shadow:var(--sh-card)}
.sk-img{height:145px;background:var(--g100);animation:shim 1.4s infinite}
.sk-body{padding:12px}.sk-line{background:var(--g100);border-radius:4px;margin-bottom:8px;animation:shim 1.4s infinite}
@keyframes shim{0%,100%{opacity:.5}50%{opacity:1}}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px}.empty-icon{font-size:48px;margin-bottom:12px}.empty-title{font-size:16px;font-weight:500;color:var(--black);margin-bottom:6px}.empty-sub{font-size:13px;color:var(--g400)}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}.sheet-overlay.open{opacity:1;pointer-events:all}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:201;background:#fff;border-radius:20px 20px 0 0;border-top:1px solid var(--g200);max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);box-shadow:0 -4px 32px rgba(0,0,0,.1)}.bottom-sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--g200);border-radius:2px;margin:12px auto}

.detail-img{height:220px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--g100)}.detail-img img{width:100%;height:100%;object-fit:cover}
.detail-content{padding:20px 16px 40px}.detail-price{font-size:28px;font-weight:600;color:var(--or);margin-bottom:6px}.detail-title{font-size:18px;font-weight:500;color:var(--black);margin-bottom:6px;line-height:1.3}.detail-loc{font-size:13px;color:var(--g400);margin-bottom:18px}
.dims-box{background:var(--ort);border:1px solid #FFD4B3;border-radius:var(--r-md);padding:16px;margin-bottom:18px}.dims-lbl{font-size:10px;color:var(--or);font-weight:600;letter-spacing:.8px;margin-bottom:10px}
.dims-row{display:flex;align-items:center;justify-content:space-around;gap:8px;flex-wrap:wrap}.dim-item{text-align:center}.dim-val{display:block;font-size:20px;font-weight:600;color:var(--ord)}.dim-lbl{display:block;font-size:11px;color:var(--orl);margin-top:2px}.dim-x{font-size:20px;color:var(--g300)}
.detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}.meta-item{background:var(--g50);border-radius:var(--r-sm);padding:10px 12px;border:1px solid var(--g200)}.meta-lbl{display:block;font-size:10px;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}.meta-val{font-size:13px;font-weight:500;color:var(--black);text-transform:capitalize}
.detail-desc{font-size:13px;color:var(--g600);line-height:1.7;margin-bottom:20px}

.btn-call{background:#fff;border:1.5px solid var(--or);color:var(--or);border-radius:var(--r-md);padding:14px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}.btn-call:hover{background:var(--ort)}
.btn-inquiry{background:var(--or);border:none;color:#fff;border-radius:var(--r-md);padding:14px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}.btn-inquiry:hover{background:var(--ord)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--r-lg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}.adm-modal{max-width:680px}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-title{font-size:16px;font-weight:500;color:var(--black)}.modal-close{background:var(--g100);border:1px solid var(--g200);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--g600);flex-shrink:0}
.modal-body{padding:20px}.fg{margin-bottom:14px}.flbl{display:block;font-size:12px;color:var(--g600);font-weight:500;margin-bottom:5px}
.finp,.fsel,.ftxt{width:100%;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r-sm);padding:10px 12px;font-size:13px;color:var(--black);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s,box-shadow .15s}
.finp:focus,.fsel:focus,.ftxt:focus{border-color:var(--or);box-shadow:0 0 0 3px var(--ort)}.finp::placeholder,.ftxt::placeholder{color:var(--g300)}.ftxt{resize:vertical;min-height:80px}
.frow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.frow2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dims-preview{font-size:12px;color:var(--or);font-weight:500;margin-top:5px;min-height:18px}
.ftog{display:flex;align-items:center;justify-content:space-between;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r-sm);padding:10px 12px}.ftog-lbl{font-size:13px;color:var(--black)}
.tog{position:relative;width:44px;height:24px;flex-shrink:0}.tog input{opacity:0;width:0;height:0}.tog-track{position:absolute;inset:0;background:var(--g300);border-radius:12px;cursor:pointer;transition:background .2s}.tog input:checked+.tog-track{background:var(--or)}.tog-track::after{content:'';position:absolute;left:3px;top:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s}.tog input:checked+.tog-track::after{transform:translateX(20px)}
.notice{background:var(--ort);border:1px solid #FFD4B3;border-radius:var(--r-sm);padding:10px 12px;font-size:12px;color:var(--ord);margin-bottom:14px;line-height:1.5}
.submit-btn{width:100%;background:var(--or);color:#fff;border:none;border-radius:var(--r-md);padding:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}.submit-btn:hover{background:var(--ord)}.submit-btn:disabled{opacity:.6;cursor:not-allowed}
.adm-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r-md);margin-bottom:10px;overflow:hidden}
.adm-top{display:flex;gap:12px;padding:14px;align-items:flex-start}.adm-thumb{width:56px;height:48px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:var(--g100)}.adm-info{flex:1;min-width:0}.adm-title{font-size:13px;font-weight:500;color:var(--black);margin-bottom:3px;line-height:1.3}.adm-city{font-size:11px;color:var(--g400);margin-bottom:6px}.adm-pills{display:flex;gap:5px;flex-wrap:wrap}.adm-pill{font-size:10px;font-weight:600;background:var(--ort);color:var(--ord);padding:2px 8px;border-radius:10px}.adm-acts{display:flex;flex-direction:column;gap:6px;flex-shrink:0}

.btn-rej-open{background:#fff;color:var(--or);border:1px solid var(--or);border-radius:var(--r-sm);padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.rej-form{padding:12px 14px;border-top:1px solid var(--g200);background:var(--g50)}.rej-presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}.preset-chip{font-size:11px;padding:3px 10px;border:1px solid var(--g200);border-radius:10px;cursor:pointer;color:var(--g600);background:#fff;transition:all .12s}.preset-chip:hover{border-color:var(--or);color:var(--or)}
.rej-input{width:100%;background:#fff;border:1px solid var(--g200);border-radius:var(--r-sm);padding:9px 12px;font-size:13px;color:var(--black);font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px}.rej-input:focus{border-color:var(--or)}.rej-btns{display:flex;gap:8px}
.btn-rej-confirm{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;border-radius:var(--r-sm);padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}.empty-adm{text-align:center;padding:40px;font-size:14px;color:var(--g400)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);z-index:9999;background:var(--black);color:#fff;border-radius:var(--r-md);padding:12px 20px;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;transition:all .25s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.success{background:var(--or)}.toast.error{background:#DC2626}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#fff;border-top:1px solid var(--g200);display:flex;justify-content:space-around;align-items:center;padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 16px;cursor:pointer;color:var(--g300);transition:color .15s;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:10px}.nav-item.on{color:var(--or)}.nav-icon{font-size:20px;line-height:1}
.nav-post{background:var(--or);border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;border:none;color:#fff;box-shadow:0 4px 14px rgba(232,93,4,.4);transition:background .15s,transform .15s;margin-top:-10px}.nav-post:hover{background:var(--ord);transform:scale(1.05)}

@supports(padding-bottom:env(safe-area-inset-bottom)){.bottom-nav{padding-bottom:calc(8px + env(safe-area-inset-bottom))}.bottom-sheet{padding-bottom:env(safe-area-inset-bottom)}}
</style>
</head>
<body>
<div class="install-bar" id="installBar"><span>Add to home screen for app experience</span><div style="display:flex;gap:8px;align-items:center"><button class="ibtn" id="installBtn">Install</button><button class="iclose" onclick="document.getElementById('installBar').classList.remove('show')">x</button></div></div>
<header class="header"><div class="header-inner"><div class="logo">1%<span>Real Estate</span></div><div class="search-wrap"><span class="sicon">&#128269;</span><input type="search" placeholder="Search city, area, location..." oninput="window.setSearch(this.value)" autocomplete="off"/></div><div class="hdr-right"><button class="btn-admin" id="adminBtn" onclick="window.openAdmin()">&#9881; Admin</button><button class="btn-post" id="postBtn" onclick="window.openPost()">+ Post</button><div id="authBtns"><button class="btn-signin" onclick="window.doSignIn()">Sign in</button></div></div></div></header>
<div class="filter-bar"><div class="filter-inner"><div class="chips"><span class="chip on" data-t="" onclick="window.setType(this)">All</span><span class="chip" data-t="plot" onclick="window.setType(this)">Plot</span><span class="chip" data-t="house" onclick="window.setType(this)">House</span><span class="chip" data-t="land" onclick="window.setType(this)">Land</span><span class="chip" data-t="flat" onclick="window.setType(this)">Flat</span></div><div class="vtog"><button class="vbtn on" id="vbGrid" onclick="window.setView('grid')">&#8857; Grid</button><button class="vbtn" id="vbMap" onclick="window.setView('map')">&#9711; Map</button></div><span class="pcnt" id="pcnt">Loading...</span></div></div>
<main class="main"><div class="property-grid" id="propGrid"></div></main>
<nav class="bottom-nav"><button class="nav-item on"><span class="nav-icon">&#127968;</span>Home</button><button class="nav-item"><span class="nav-icon">&#128269;</span>Search</button><button class="nav-post" onclick="window.openPost()">+</button><button class="nav-item"><span class="nav-icon">&#128276;</span>Alerts</button><button class="nav-item" onclick="window.doSignIn()"><span class="nav-icon">&#128100;</span>Profile</button></nav>
<div class="sheet-overlay" id="sheetOverlay" onclick="window.closeDetail()"></div>
<div class="bottom-sheet" id="detailSheet"><div class="sheet-handle"></div><button class="sheet-close" onclick="window.closeDetail()">x</button><div id="detailBody"></div></div>
<div class="modal-overlay" id="postModal"><div class="modal"><div class="modal-header"><span class="modal-title">Post Your Property</span><button class="modal-close" onclick="window.closePost()">x</button></div><div class="modal-body"><form onsubmit="window.submitProperty(event)"><div class="fg"><label class="flbl">Property type *</label><select name="type_" class="fsel" required><option value="plot">Plot</option><option value="house">House</option><option value="land">Land</option><option value="flat">Flat</option></select></div><div class="fg"><label class="flbl">Title *</label><input name="title_" class="finp" placeholder="e.g. Corner plot near ORR, Kondapur" required/></div><div class="frow2"><div class="fg"><label class="flbl">Address *</label><input name="address" class="finp" placeholder="Street / locality" required/></div><div class="fg"><label class="flbl">City</label><input name="city" class="finp" placeholder="Hyderabad"/></div></div><div class="fg"><label class="flbl">Dimensions</label><div class="frow"><input id="fLft" name="lengthFt" class="finp" type="number" placeholder="Length ft" oninput="window.updDims()"/><input id="fWft" name="widthFt" class="finp" type="number" placeholder="Width ft" oninput="window.updDims()"/><input name="areaSqft" class="finp" type="number" placeholder="Area sqft"/></div><div class="dims-preview" id="dimsPreview"></div></div><div class="fg"><label class="flbl">Price (Rs) *</label><input name="price" class="finp" type="number" placeholder="e.g. 4500000" required/></div><div class="fg"><label class="flbl">Description</label><textarea name="description" class="ftxt" placeholder="Describe your property..."></textarea></div><div class="fg"><label class="flbl">Cover photo</label><input id="photoInput" type="file" accept="image/*" class="finp"/></div><div class="fg"><div class="ftog"><span class="ftog-lbl">Price negotiable</span><label class="tog"><input type="checkbox" name="negotiable" checked/><span class="tog-track"></span></label></div></div><div class="notice">Your listing will be reviewed by admin before going live.</div><button type="submit" class="submit-btn">Submit for Approval</button></form></div></div></div>
<div class="modal-overlay" id="adminModal"><div class="modal adm-modal"><div class="modal-header"><span class="modal-title">&#9881; Admin - Pending Approvals</span><button class="modal-close" onclick="window.closeAdmin()">x</button></div><div class="modal-body" id="pendingList"><div style="text-align:center;padding:40px;color:#AAA">Loading...</div></div></div></div>

<script type="module">

import{getFirestore,collection,query,where,orderBy,limit,getDocs,addDoc,updateDoc,doc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import{getStorage,ref,uploadBytes,getDownloadURL}from"https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);
const provider=new GoogleAuthProvider();
let currentUser=null,vMode='grid',typeF='',searchQ='',allProps=[];
function fp(p){if(p>=10000000)return`\u20b9${(p/10000000).toFixed(1)}Cr`;if(p>=100000)return`\u20b9${(p/100000).toFixed(1)}L`;return`\u20b9${Number(p).toLocaleString('en-IN')}`;}
function ago(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);const s=Math.floor((Date.now()-d.getTime())/1000);if(s<86400)return'Today';if(s<172800)return'Yesterday';if(s<604800)return`${Math.floor(s/86400)}d ago`;return`${Math.floor(s/604800)}w ago`;}
function isNew(ts){if(!ts)return false;const d=ts.toDate?ts.toDate():new Date(ts);return Date.now()-d.getTime()<7*86400000;}
const TC={plot:'#E85D04',house:'#185FA5',land:'#BA7517',flat:'#7C3AED'};
const TB={plot:'#FFF0E6',house:'#EFF6FF',land:'#FFFBEB',flat:'#F5F3FF'};
const TI={plot:'\u25a1',house:'\u2302',land:'\U0001f33f',flat:'\u25a0'};

onAuthStateChanged(auth,async u=>{
  currentUser=u;
  const ab=document.getElementById('authBtns'),pb=document.getElementById('postBtn'),adm=document.getElementById('adminBtn');
  if(!ab)return;
  if(u){
    ab.innerHTML=`<img src="${u.photoURL||''}" class="user-avatar" title="Sign out" onclick="window.doSignOut()"/>`;
    if(pb)pb.style.display='flex';
    const q2=query(collection(db,'users'),where('id','==',u.uid));
    const sn=await getDocs(q2);
    if(sn.empty){await addDoc(collection(db,'users'),{id:u.uid,fullName:u.displayName||'User',email:u.email,photoURL:u.photoURL||'',phone:'',role:'user',createdAt:serverTimestamp()});}
    else if(sn.docs[0].data().role==='admin'||sn.docs[0].data().role==='superadmin'){if(adm)adm.style.display='flex';}
  }else{ab.innerHTML=`<button class="btn-signin" onclick="window.doSignIn()">Sign in</button>`;if(pb)pb.style.display='none';if(adm)adm.style.display='none';}
});
window.doSignIn=async()=>{try{await signInWithPopup(auth,provider);}catch(e){console.error(e);}};
window.doSignOut=async()=>{if(confirm('Sign out?'))await signOut(auth);};

async function loadProps(){
  showSkeleton();
  try{
    const q2=query(collection(db,'properties'),where('status','==','approved'),orderBy('createdAt','desc'),limit(40));
    const sn=await getDocs(q2);
    allProps=sn.docs.map(d=>({id:d.id,...d.data()}));render();
  }catch(e){console.warn('Firebase not configured, loading demo data');loadDemo();}
}

    {

      createdAt:{toDate:()=>new Date()},

    },

      createdAt:{toDate:()=>new Date(Date.now()-259200000)},

    },

      description:'Stunning 3BHK apartment on the 14th floor with panoramic views of Hyderabad skyline and Hussain Sagar lake. Fully loaded amenities building: rooftop infinity pool, sky lounge, co-working space, EV charging stations, concierge services, 3-tier security. Apartment features: 10-foot ceilings, floor-to-ceiling windows, Italian marble, premium kitchen appliances, smart home automation, 2 covered parking. Walking distance to DLF Cyber City and ISB campus. RERA registered.',
      createdAt:{toDate:()=>new Date(Date.now()-604800000)},
      px:488,py:200
    },

function showSkeleton(){document.getElementById('propGrid').innerHTML=Array.from({length:8}).map(()=>`<div class="sk-card"><div class="sk-img"></div><div class="sk-body"><div class="sk-line" style="height:18px;width:55%"></div><div class="sk-line" style="height:13px;width:85%"></div><div class="sk-line" style="height:13px;width:60%"></div><div class="sk-line" style="height:13px;width:70%"></div></div></div>`).join('');}
function getFiltered(){return allProps.filter(p=>{const mt=!typeF||p.type===typeF;const ms=!searchQ||p.title.toLowerCase().includes(searchQ.toLowerCase())||p.city.toLowerCase().includes(searchQ.toLowerCase());return mt&&ms;});}
function render(){const data=getFiltered();document.getElementById('pcnt').textContent=`${data.length} propert${data.length===1?'y':'ies'}`;if(vMode==='grid')renderGrid(data);else renderMap(data);}

function renderGrid(data){
  const g=document.getElementById('propGrid');
  if(!data.length){g.innerHTML=`<div class="empty-state"><div class="empty-icon">&#127968;</div><div class="empty-title">No properties found</div><div class="empty-sub">Try a different search or filter</div></div>`;return;}
  g.innerHTML=data.map((p,i)=>{
    const c=TC[p.type]||'#E85D04',bg=TB[p.type]||'#FFF0E6',hasDim=p.lengthFt>0&&p.widthFt>0;
    return`<div class="card" style="animation-delay:${i*.04}s" onclick="window.openDetail('${p.id}')">
      <div class="card-img" style="background:${bg}">
        ${p.coverPhoto?`<img src="${p.coverPhoto}" alt="${p.title}" loading="lazy"/>`:`<span class="type-icon">${p.type==='plot'?'&#9633;':p.type==='house'?'&#8962;':p.type==='land'?'&#127807;':'&#9632;'}</span>`}
        ${isNew(p.createdAt)?'<span class="badge-new">NEW</span>':''}
        <span class="badge-type" style="color:${c};border-color:${c}44;background:${c}18">${(p.type||'plot').toUpperCase()}</span>
      </div>
      <div class="card-body">
        <div class="card-price">${fp(p.price)}</div>
        <div class="card-title">${p.title}</div>
        <div class="card-loc">&#128205; ${p.city}</div>
        <div class="card-dims">${hasDim?`<span class="dim-pill">${p.lengthFt}&times;${p.widthFt} ft</span>`:''}${p.areaSqft?`<span class="dim-pill">${Number(p.areaSqft).toLocaleString()} sqft</span>`:''}</div>
        <div class="card-foot"><span class="card-time">${ago(p.createdAt)}</span>${p.isNegotiable?'<span class="neg-tag">Negotiable</span>':''}</div>
      </div></div>`;
  }).join('');
}

let googleMap=null,googleMarkers=[],mapData=[];
function renderMap(data){
  mapData=data;
  const g=document.getElementById('propGrid');
  g.innerHTML=`<div class="map-wrap"><div id="googleMapDiv" style="width:100%;height:100%"></div><div class="map-legend">${Object.entries(TC).map(([t,c])=>`<div class="mleg-row"><div class="mleg-dot" style="background:${c}"></div><span style="text-transform:capitalize">${t}</span></div>`).join('')}</div><div class="map-popup" id="mapPopup"></div></div>`;
  if(window.google&&window.google.maps)initGoogleMapView(data);else renderSVGMap(data);
}
window.initGoogleMap=function(){if(vMode==='map')initGoogleMapView(mapData);};
function initGoogleMapView(data){
  const mapDiv=document.getElementById('googleMapDiv');if(!mapDiv)return;
  googleMarkers.forEach(m=>m.setMap(null));googleMarkers=[];
  if(!googleMap){googleMap=new google.maps.Map(mapDiv,{center:{lat:17.385,lng:78.4867},zoom:11,mapTypeControl:false,streetViewControl:false,fullscreenControl:false});}
  const bounds=new google.maps.LatLngBounds();let hasPoints=false;
  data.forEach(p=>{
    const lat=p.lat||(p.py?(17.3+((p.py||240)-240)*-0.002):null);
    const lng=p.lng||(p.px?(78.3+((p.px||300)-300)*0.002):null);
    if(!lat||!lng)return;hasPoints=true;const pos={lat,lng};bounds.extend(pos);
    const color=TC[p.type]||'#E85D04',label=fp(p.price);
    const pinSvg=`<svg xmlns="http://www.w3.org/2000/svg" width="${label.length*8+20}" height="32"><rect x="1" y="1" width="${label.length*8+18}" height="24" rx="6" fill="${color}"/><polygon points="${(label.length*8+20)/2-6},25 ${(label.length*8+20)/2+6},25 ${(label.length*8+20)/2},31" fill="${color}"/><text x="${(label.length*8+20)/2}" y="16" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="white">${label}</text></svg>`;
    const marker=new google.maps.Marker({position:pos,map:googleMap,icon:{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(pinSvg),anchor:new google.maps.Point((label.length*8+20)/2,31)}});
    marker.addListener('click',()=>showGooglePopup(p,marker));googleMarkers.push(marker);
  });
  if(hasPoints&&googleMarkers.length>1)googleMap.fitBounds(bounds,60);
}
let infoWindow=null;
function showGooglePopup(p,marker){
  if(infoWindow)infoWindow.close();
  const hasDim=p.lengthFt>0&&p.widthFt>0;
  const content=`<div style="font-family:'DM Sans',sans-serif;min-width:180px;padding:4px"><div style="font-size:16px;font-weight:600;color:#E85D04;margin-bottom:3px">${fp(p.price)}</div><div style="font-size:12px;font-weight:500;color:#111;margin-bottom:3px">${p.title}</div><div style="font-size:11px;color:#666;margin-bottom:8px">&#128205; ${p.city}</div>${hasDim?`<div style="background:#FFF0E6;border-radius:8px;padding:8px;margin-bottom:8px"><div style="font-size:9px;color:#E85D04;font-weight:600;margin-bottom:5px">DIMENSIONS</div><div style="font-size:13px;font-weight:600;color:#C44D00">${p.lengthFt}ft &times; ${p.widthFt}ft${p.areaSqft?` = ${Number(p.areaSqft).toLocaleString()} sqft`:''}</div></div>`:''}<button onclick="window.openDetail('${p.id}')" style="width:100%;background:#E85D04;color:#fff;border:none;border-radius:7px;padding:7px;font-size:12px;cursor:pointer">View Details</button></div>`;
  infoWindow=new google.maps.InfoWindow({content});infoWindow.open(googleMap,marker);
}
function renderSVGMap(data){
  const mapDiv=document.getElementById('googleMapDiv');if(!mapDiv)return;
  mapDiv.innerHTML=`<svg style="width:100%;height:100%" viewBox="0 0 620 480" id="msvg" onclick="closePopup(event)"><rect width="620" height="480" fill="#F5F0E8"/><ellipse cx="310" cy="240" rx="280" ry="190" fill="#EDE5D8" stroke="#D8CEBF" stroke-width="1"/><ellipse cx="310" cy="240" rx="200" ry="130" fill="#E5DDD0"/><rect x="40" y="236" width="540" height="7" fill="#D4C9B8" rx="3" opacity=".6"/><rect x="306" y="40" width="7" height="400" fill="#D4C9B8" rx="3" opacity=".6"/><text x="310" y="22" text-anchor="middle" font-size="12" fill="#B8A898" font-family="sans-serif">Hyderabad Region</text>${data.map(p=>{const c=TC[p.type]||'#E85D04',lbl=fp(p.price),px=p.px||300,py=p.py||240,w=lbl.length*7+18;return`<g style="cursor:pointer" onclick="window.pinClick(event,'${p.id}')" transform="translate(${px},${py})"><rect x="${-w/2}" y="-13" width="${w}" height="24" rx="6" fill="${c}"/><polygon points="-5,11 5,11 0,18" fill="${c}"/><text x="0" y="4" text-anchor="middle" font-size="10" fill="white" font-weight="500" font-family="sans-serif">${lbl}</text></g>`;}).join('')}</svg>`;
}
window.pinClick=function(e,id){
  e.stopPropagation();const p=allProps.find(x=>x.id===id);if(!p)return;
  const popup=document.getElementById('mapPopup');if(!popup)return;
  const hasDim=p.lengthFt>0&&p.widthFt>0;
  popup.innerHTML=`<div class="pp-price">${fp(p.price)}</div><div class="pp-title">${p.title}</div><div class="pp-loc">&#128205; ${p.city}</div>${hasDim?`<div class="pp-dims"><div class="pp-dims-lbl">DIMENSIONS</div><div class="pp-dims-row"><div class="pp-dim"><span class="pp-dv">${p.lengthFt}ft</span><span class="pp-dl">Length</span></div><span class="pp-x">&times;</span><div class="pp-dim"><span class="pp-dv">${p.widthFt}ft</span><span class="pp-dl">Width</span></div>${p.areaSqft?`<span class="pp-x">=</span><div class="pp-dim"><span class="pp-dv">${Number(p.areaSqft).toLocaleString()}</span><span class="pp-dl">sqft</span></div>`:''}</div></div>`:''}<button class="pp-btn" onclick="window.openDetail('${p.id}')">View Details</button>`;
  const msvg=document.getElementById('msvg');if(!msvg)return;
  const bbox=msvg.getBoundingClientRect(),scX=bbox.width/620,scY=bbox.height/480;
  let left=(p.px||300)*scX+10,top=(p.py||240)*scY-150;
  if(left+210>bbox.width)left=(p.px||300)*scX-220;if(top<10)top=(p.py||240)*scY+25;
  popup.style.left=left+'px';popup.style.top=top+'px';popup.classList.add('show');
};
function closePopup(e){const pp=document.getElementById('mapPopup');if(pp&&!pp.contains(e.target))pp.classList.remove('show');}

window.openDetail=function(id){
  const p=allProps.find(x=>x.id===id);if(!p)return;
  const hasDim=p.lengthFt>0&&p.widthFt>0,bg=TB[p.type]||'#FFF0E6';
  document.getElementById('detailBody').innerHTML=`<div class="detail-img" style="background:${bg}">${p.coverPhoto?`<img src="${p.coverPhoto}" alt="${p.title}"/>`:`<span style="font-size:64px">${p.type==='plot'?'&#9633;':p.type==='house'?'&#8962;':p.type==='land'?'&#127807;':'&#9632;'}</span>`}</div><div class="detail-content"><div class="detail-price">${fp(p.price)}</div><div class="detail-title">${p.title}</div><div class="detail-loc">&#128205; ${p.city}</div>${hasDim?`<div class="dims-box"><div class="dims-lbl">DIMENSIONS</div><div class="dims-row"><div class="dim-item"><span class="dim-val">${p.lengthFt} ft</span><span class="dim-lbl">Length</span></div><span class="dim-x">&times;</span><div class="dim-item"><span class="dim-val">${p.widthFt} ft</span><span class="dim-lbl">Width</span></div>${p.areaSqft?`<span class="dim-x">=</span><div class="dim-item"><span class="dim-val">${Number(p.areaSqft).toLocaleString()}</span><span class="dim-lbl">sq ft</span></div>`:''}</div></div>`:''}<div class="detail-meta"><div class="meta-item"><span class="meta-lbl">Type</span><span class="meta-val">${p.type}</span></div><div class="meta-item"><span class="meta-lbl">Area</span><span class="meta-val">${p.areaSqft?Number(p.areaSqft).toLocaleString()+' sqft':'n/a'}</span></div><div class="meta-item"><span class="meta-lbl">Negotiable</span><span class="meta-val">${p.isNegotiable?'Yes':'No'}</span></div><div class="meta-item"><span class="meta-lbl">Posted</span><span class="meta-val">${ago(p.createdAt)}</span></div></div>${p.description?`<div class="detail-desc">${p.description}</div>`:''}<div class="contact-btns"><button class="btn-call" onclick="alert('Contact seller coming soon!')">&#128222; Call Seller</button><button class="btn-inquiry" onclick="alert('Inquiry coming soon!')">&#128172; Inquiry</button></div></div>`;
  document.getElementById('sheetOverlay').classList.add('open');document.getElementById('detailSheet').classList.add('open');
};
window.closeDetail=function(){document.getElementById('sheetOverlay').classList.remove('open');document.getElementById('detailSheet').classList.remove('open');};
window.setSearch=v=>{searchQ=v;render();};
window.setType=el=>{document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');typeF=el.dataset.t;render();};
window.setView=v=>{vMode=v;document.getElementById('vbGrid').classList.toggle('on',v==='grid');document.getElementById('vbMap').classList.toggle('on',v==='map');render();};
window.openPost=()=>{if(!currentUser){window.doSignIn();return;}document.getElementById('postModal').classList.add('open');};
window.closePost=()=>document.getElementById('postModal').classList.remove('open');
window.updDims=()=>{const l=Number(document.getElementById('fLft')?.value)||0,w=Number(document.getElementById('fWft')?.value)||0,pr=document.getElementById('dimsPreview');if(pr)pr.textContent=l&&w?`${l} ft \xd7 ${w} ft = ${(l*w).toLocaleString()} sqft`:'';}
window.submitProperty=async e=>{
  e.preventDefault();if(!currentUser)return;
  const form=e.target,btn=form.querySelector('.submit-btn');btn.textContent='Submitting...';btn.disabled=true;
  try{
    const data={ownerId:currentUser.uid,title:form.title_.value.trim(),description:form.description.value.trim(),type:form.type_.value,address:form.address.value.trim(),city:form.city.value.trim()||'Hyderabad',lengthFt:Number(form.lengthFt.value)||0,widthFt:Number(form.widthFt.value)||0,areaSqft:Number(form.areaSqft.value)||0,price:Number(form.price.value),isNegotiable:form.negotiable.checked,status:'pending',viewsCount:0,createdAt:serverTimestamp(),updatedAt:serverTimestamp()};
    const pi=form.querySelector('#photoInput');
    if(pi.files.length>0){const f=pi.files[0],sr=ref(storage,`properties/${Date.now()}/${f.name}`),sn=await uploadBytes(sr,f);data.coverPhoto=await getDownloadURL(sn.ref);}
    await addDoc(collection(db,'properties'),data);window.closePost();form.reset();showToast('Submitted! Admin will review your listing.','success');
  }catch(err){showToast('Error: '+err.message,'error');}finally{btn.textContent='Submit for Approval';btn.disabled=false;}
};
window.openAdmin=async()=>{
  if(!currentUser)return;document.getElementById('adminModal').classList.add('open');
  const list=document.getElementById('pendingList');list.innerHTML='<div style="text-align:center;padding:40px;color:#AAA">Loading...</div>';
  try{
    const q2=query(collection(db,'properties'),where('status','==','pending'),orderBy('createdAt','asc'));
    const sn=await getDocs(q2);const items=sn.docs.map(d=>({id:d.id,...d.data()}));
    if(!items.length){list.innerHTML='<div class="empty-adm">All caught up! No pending listings.</div>';return;}
    list.innerHTML=items.map(p=>`<div class="adm-card" id="adc-${p.id}"><div class="adm-top"><div class="adm-thumb" style="background:${TB[p.type]||'#FFF0E6'}">${p.type==='plot'?'&#9633;':p.type==='house'?'&#8962;':p.type==='land'?'&#127807;':'&#9632;'}</div><div class="adm-info"><div class="adm-title">${p.title}</div><div class="adm-city">&#128205; ${p.city}</div><div class="adm-pills"><span class="adm-pill">${fp(p.price)}</span>${p.areaSqft?`<span class="adm-pill">${Number(p.areaSqft).toLocaleString()} sqft</span>`:''} ${p.lengthFt>0?`<span class="adm-pill">${p.lengthFt}&times;${p.widthFt} ft</span>`:''}</div></div><div class="adm-acts"><button class="btn-approve" onclick="window.doApprove('${p.id}')">&#10003; Approve</button><button class="btn-rej-open" onclick="window.showRej('${p.id}')">&#10007; Reject</button></div></div><div class="rej-form" id="rf-${p.id}" style="display:none"><div class="rej-presets">${['Documents missing','Duplicate listing','Incorrect dimensions','Unclear photos','Price mismatch','Fraudulent'].map(r=>`<span class="preset-chip" onclick="document.getElementById('rr-${p.id}').value='${r}'">${r}</span>`).join('')}</div><input class="rej-input" id="rr-${p.id}" placeholder="Rejection reason..."/><div class="rej-btns"><button class="btn-approve" onclick="window.doApprove('${p.id}')">&#10003; Approve</button><button class="btn-rej-confirm" onclick="window.doReject('${p.id}')">&#10007; Reject</button></div></div></div>`).join('');
  }catch(e){list.innerHTML='<div style="color:#DC2626;padding:20px">Error loading. Check Firebase rules.</div>';}
};
window.closeAdmin=()=>document.getElementById('adminModal').classList.remove('open');
window.showRej=id=>{const r=document.getElementById(`rf-${id}`);if(r)r.style.display=r.style.display==='none'?'block':'none';};
window.doApprove=async id=>{try{await updateDoc(doc(db,'properties',id),{status:'approved',reviewedBy:currentUser.uid,reviewedAt:serverTimestamp()});document.getElementById(`adc-${id}`)?.remove();showToast('Approved! Seller notified.','success');loadProps();}catch(e){showToast('Error: '+e.message,'error');}};
window.doReject=async id=>{const r=document.getElementById(`rr-${id}`)?.value?.trim();if(!r){showToast('Enter rejection reason first','error');return;}try{await updateDoc(doc(db,'properties',id),{status:'rejected',rejectionReason:r,reviewedBy:currentUser.uid,reviewedAt:serverTimestamp()});document.getElementById(`adc-${id}`)?.remove();showToast('Rejected. Seller notified.','');}catch(e){showToast('Error: '+e.message,'error');}};
function showToast(msg,type=''){const t=document.createElement('div');t.className=`toast${type?' '+type:''}`;t.textContent=msg;document.body.appendChild(t);requestAnimationFrame(()=>t.classList.add('show'));setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},3000);}
window.showToast=showToast;
let dPr=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dPr=e;document.getElementById('installBar')?.classList.add('show');document.getElementById('installBtn').onclick=async()=>{dPr.prompt();await dPr.userChoice;document.getElementById('installBar')?.classList.remove('show');dPr=null;};});
if('serviceWorker'in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(e=>console.log('SW:',e));});}
loadProps();
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDSkAoFUJNOoFectl42e_b3p82E5kAmCbE&callback=initGoogleMap"></script>
</body>
</html>
